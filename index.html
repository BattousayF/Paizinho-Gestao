const { useState, useEffect, useMemo, useRef } = React;

// ---------- ícones (SVG inline, sem dependência externa) ----------
function Icon({ size = 16, color, strokeWidth = 2, className = "", children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
      {children}
    </svg>
  );
}

const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></Icon>;
const Pencil = (p) => <Icon {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" /></Icon>;
const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9" /></Icon>;
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;

const Users = (p) => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></Icon>;
const ClipboardList = (p) => <Icon {...p}><rect x="8" y="2" width="8" height="4" rx="1" /><path d="M9 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-3" /><path d="M9 12h6" /><path d="M9 16h6" /><path d="M9 8h1" /></Icon>;
const Wallet = (p) => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4Z" /></Icon>;
const Boxes = (p) => <Icon {...p}><path d="M2.5 7 12 2l9.5 5-9.5 5-9.5-5Z" /><path d="M2.5 7v10L12 22l9.5-5V7" /><path d="M12 12v10" /></Icon>;
const GuitarIcon = (p) => <Icon {...p}><circle cx="9.5" cy="16.5" r="5.5" /><circle cx="9.5" cy="16.5" r="2" /><path d="M13 13 20 6" /><path d="M17 3l4 4" /><path d="M15.5 5.5l3 3" /></Icon>;
const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></Icon>;
const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></Icon>;
const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></Icon>;
const ShoppingCart = (p) => <Icon {...p}><circle cx="8" cy="21" r="1" /><circle cx="19" cy="21" r="1" /><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 2-1.58l1.65-7.42H5.12" /></Icon>;
const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12" /></Icon>;

// ---------- paleta & tokens (mesma linguagem visual do site PAIZINHO) ----------

  bgSoft: "#FFFCF5",
  panel: "#EAE0C4",
  panelLine: "#D9C9A0",
  espresso: "#2B1D14",
  espressoSoft: "#6B5A44",
  brass: "#A9812F",
  brassDark: "#7E5F22",
  brassLight: "#C9A45C",
  danger: "#8B3A2E",
  success: "#4C6B4F",
};

const INSTRUMENT_TYPES = [
  "Violão Aço Tradicional",
  "Violão Aço Autoral",
  "Violão Clássico",
  "Guitarra Flamenca",
  "Violão 7 Cordas",
  "Oitavino",
  "Viola Caipira",
  "Cavaquinho",
  "Bandolim 8 Cordas",
  "Bandolim 10 Cordas",
  "Banjo",

// Retorna o nome do instrumento pra exibir — se for "Outro", usa o texto digitado.

  if (item.instrumentType === "Outro" && item.instrumentTypeOther) {
    return item.instrumentTypeOther;
  }
  return item.instrumentType;
}
const PAYMENT_METHODS = ["Pix", "Bitcoin", "Outra criptomoeda", "Dinheiro", "Transferência", "Cartão"];
const PAYMENT_PLANS = ["50% entrada / 50% na entrega", "Entrada + parcelas mensais", "À vista", "Outro / personalizado"];
const ORDER_STATUS = ["Em construção", "Finalizado - aguardando entrega", "Entregue", "Cancelado"];
const STOCK_STATUS = ["Disponível", "Reservado", "Vendido"];

const DEFAULT_SHOPPING_ITEMS = ["Tampo", "Lateral e fundo", "Braço", "Escala", "Tarraxas", "Case"];
const EXTRA_SHOPPING_OPTIONS = ["Cordas", "Verniz/Goma-laca", "Roseta", "Pestana", "Rastilho", "Correia", "Cabeçote", "Estojo extra", "Outro"];

// Senha simples de entrada do app — troque aqui pela senha que você quiser.
// Atenção: é uma trava simples pra afastar curiosos, não é segurança de verdade
// (qualquer pessoa que souber olhar o código-fonte da página consegue ver essa senha).
const APP_PASSWORD = "306020";

const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`);

const brl = (n) =>
  (Number(n) || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

const monthNames = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

// ---------- storage helpers ----------
async function loadKey(key, fallback) {
  try {
    const raw = localStorage.getItem("paizinho:" + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
async function saveKey(key, value) {
  try {
    localStorage.setItem("paizinho:" + key, JSON.stringify(value));
  } catch (e) {
    console.error("erro ao salvar", key, e);
  }
}

// ---------- pequenos componentes utilitários ----------

    <label className={`flex flex-col gap-1 ${className}`}>

        {label}
      </span>
      {children}
    </label>
  );
}

const inputStyle = {
  background: C.bgSoft,
  border: `1px solid ${C.panelLine}`,
  color: C.espresso,
  fontFamily: "'Instrument Sans', sans-serif",
};

function TextInput(props) {
  return (
    <input
      {...props}
      style={inputStyle}
      className={`rounded-md px-3 py-2 text-sm outline-none focus:ring-2 ${props.className || ""}`}
    />
  );
}
function TextArea(props) {
  return (
    <textarea
      {...props}
      style={inputStyle}
      className={`rounded-md px-3 py-2 text-sm outline-none focus:ring-2 ${props.className || ""}`}
    />
  );
}
function Select({ children, ...props }) {
  return (
    <select {...props} style={inputStyle} className="rounded-md px-3 py-2 text-sm outline-none focus:ring-2">
      {children}
    </select>
  );
}

function Btn({ children, onClick, variant = "brass", type = "button", className = "", disabled }) {
  const styles = {
    brass: { background: C.brass, color: "#fff" },
    ghost: { background: "transparent", color: C.espresso, border: `1px solid ${C.panelLine}` },
    danger: { background: "transparent", color: C.danger, border: `1px solid ${C.danger}` },
  }[variant];
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      style={styles}
      className={`inline-flex items-center gap-1.5 rounded-md px-3 py-2 text-sm font-medium transition-opacity hover:opacity-85 disabled:opacity-40 ${className}`}

      {children}
    </button>
  );
}

function SectionCard({ children, className = "", style = {} }) {

    <div
      style={{ background: C.bgSoft, border: `1px solid ${C.panelLine}`, ...style }}
      className={`rounded-xl p-5 shadow-sm ${className}`}

}

const LOGO_SRC = "logo-badge.png"; // sua logo (versão clara pro fundo escuro do círculo)

function Logo() {

// ================= APP =================
function App() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("pedidos");
  const [showBackup, setShowBackup] = useState(false);
  const fileInputRef = useRef(null);

  const [unlocked, setUnlocked] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);

  const [clients, setClients] = useState([]);
  const [orders, setOrders] = useState([]);
  const [materials, setMaterials] = useState([]);
  const [finished, setFinished] = useState([]);

  useEffect(() => {
    (async () => {
      const [c, o, m, f, u] = await Promise.all([
        loadKey("clients", []),
        loadKey("orders", []),
        loadKey("materials", []),
        loadKey("finished-instruments", []),
        loadKey("unlocked", false),
      ]);
      setClients(c);
      setOrders(o);
      setMaterials(m);
      setFinished(f);
      setUnlocked(u === true);
      setLoading(false);
    })();
  }, []);

  useEffect(() => { if (!loading) saveKey("clients", clients); }, [clients, loading]);
  useEffect(() => { if (!loading) saveKey("orders", orders); }, [orders, loading]);
  useEffect(() => { if (!loading) saveKey("materials", materials); }, [materials, loading]);
  useEffect(() => { if (!loading) saveKey("finished-instruments", finished); }, [finished, loading]);

  function tryUnlock(e) {
    e.preventDefault();
    if (pinInput === APP_PASSWORD) {
      setUnlocked(true);
      setPinError(false);
      saveKey("unlocked", true);
    } else {
      setPinError(true);
    }
    setPinInput("");
  }

  function lockApp() {
    setUnlocked(false);
    saveKey("unlocked", false);
  }

  function exportData() {
    const payload = {
      app: "paizinho-gestao",
      version: 1,
      exportedAt: new Date().toISOString(),
      clients, orders, materials, finished,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `paizinho-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function triggerImport() {
    fileInputRef.current?.click();
  }

  function handleImportFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data || typeof data !== "object") throw new Error("formato inválido");
        const ok = confirm(
          "Isso vai substituir todos os dados atuais do app (clientes, pedidos, estoque) pelos dados do arquivo de backup. Essa ação não pode ser desfeita. Continuar?"
        );
        if (!ok) return;
        setClients(Array.isArray(data.clients) ? data.clients : []);
        setOrders(Array.isArray(data.orders) ? data.orders : []);
        setMaterials(Array.isArray(data.materials) ? data.materials : []);
        setFinished(Array.isArray(data.finished) ? data.finished : []);
        alert("Backup importado com sucesso.");
        setShowBackup(false);
      } catch (err) {
        alert("Não consegui ler esse arquivo. Confira se é um backup válido gerado pelo próprio app.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const tabs = [
    { id: "clientes", label: "Clientes", icon: Users },
    { id: "pedidos", label: "Pedidos", icon: ClipboardList },
    { id: "financeiro", label: "Financeiro", icon: Wallet },
    { id: "estoque", label: "Estoque", icon: Boxes },
    { id: "compras", label: "Compras", icon: ShoppingCart },
  ];

  if (loading) {
    return (
      <div style={{ background: C.bg, minHeight: "100vh" }} className="flex items-center justify-center">
        <div style={{ color: C.espressoSoft, fontFamily: "'Instrument Sans', sans-serif" }}>Carregando ateliê…</div>
      </div>
    );
  }

  if (!unlocked) {
    return (
      <div style={{ background: C.bg, minHeight: "100vh" }} className="flex items-center justify-center px-4">
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=Instrument+Sans:wght@400;500;600&display=swap');`}</style>
        <form onSubmit={tryUnlock} className="w-full max-w-xs flex flex-col items-center gap-5">
          <Logo />
          <div className="w-full flex flex-col gap-2">
            <input
              type="password"
              inputMode="numeric"
              autoFocus
              value={pinInput}
              onChange={(e) => { setPinInput(e.target.value); setPinError(false); }}
              placeholder="Senha"
              style={{ background: C.bgSoft, border: `1px solid ${pinError ? C.danger : C.panelLine}`, color: C.espresso, fontFamily: "'Instrument Sans', sans-serif" }}
              className="rounded-md px-4 py-3 text-center text-lg outline-none focus:ring-2 tracking-widest"
            />
            {pinError && (
              <div className="text-sm text-center" style={{ color: C.danger }}>Senha incorreta. Tente de novo.</div>
            )}
          </div>
          <Btn type="submit" className="w-full justify-center">Entrar</Btn>
        </form>
      </div>
    );
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        * { box-sizing: border-box; }
        input:focus, textarea:focus, select:focus { --tw-ring-color: ${C.brassLight}; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: ${C.panelLine}; border-radius: 8px; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        .print-only { display: none; }
        @media print {
          * { visibility: hidden; }
          .print-area, .print-area * { visibility: visible; }
          .print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 12px 24px; }
          .no-print { display: none !important; }
          .print-only { display: block !important; }
        }
      `}</style>

      <header style={{ borderBottom: `1px solid ${C.panelLine}`, background: C.bg }} className="sticky top-0 z-20 no-print">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <Logo />
          <div className="flex items-center gap-2 flex-wrap">
            <nav className="flex gap-1 flex-wrap">
              {tabs.map((t) => {
                const Icon = t.icon;
                const active = tab === t.id;
                return (
                  <button
                    key={t.id}
                    onClick={() => setTab(t.id)}
                    style={{
                      background: active ? C.espresso : "transparent",
                      color: active ? C.brassLight : C.espressoSoft,
                      fontFamily: "'Instrument Sans', sans-serif",
                    }}
                    className="flex items-center gap-2 rounded-full px-4 py-2 text-sm font-medium transition-colors"
                  >
                    <Icon size={15} /> {t.label}
                  </button>
                );
              })}
            </nav>
            <button
              onClick={() => setShowBackup((v) => !v)}
              style={{ color: C.brassDark, border: `1px solid ${C.panelLine}`, fontFamily: "'Instrument Sans', sans-serif" }}
              className="flex items-center gap-2 rounded-full px-4 py-2 text-sm font-medium"
            >
              <Download size={15} /> Backup
            </button>
            <button
              onClick={lockApp}
              title="Bloquear app"
              style={{ color: C.brassDark, border: `1px solid ${C.panelLine}`, fontFamily: "'Instrument Sans', sans-serif" }}
              className="flex items-center gap-2 rounded-full px-4 py-2 text-sm font-medium"
            >
              <Lock size={15} />
            </button>
          </div>
        </div>
      </header>

      {showBackup && (
        <div className="max-w-6xl mx-auto px-4 sm:px-6 pt-4 no-print">
          <SectionCard>
            <div className="text-xs uppercase tracking-wider mb-3" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
              Backup dos dados
            </div>
            <p className="text-sm mb-3" style={{ color: C.espressoSoft }}>
              Seus dados ficam salvos só neste aparelho/navegador. Exporte um arquivo de backup de vez em quando e guarde num lugar seguro (iCloud, e-mail, Drive). Se trocar de aparelho, importe esse arquivo pra recuperar tudo.
            </p>
            <div className="flex flex-wrap gap-2">
              <Btn onClick={exportData}><Download size={16} /> Exportar backup (.json)</Btn>
              <Btn variant="ghost" onClick={triggerImport}><Upload size={16} /> Importar backup (.json)</Btn>
            </div>
            <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImportFile} style={{ display: "none" }} />
          </SectionCard>
        </div>
      )}

      <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        {tab === "clientes" && <ClientesTab clients={clients} setClients={setClients} orders={orders} />}
        {tab === "pedidos" && (
          <PedidosTab orders={orders} setOrders={setOrders} clients={clients} />
        )}
        {tab === "financeiro" && <FinanceiroTab orders={orders} clients={clients} />}
        {tab === "estoque" && (
          <EstoqueTab materials={materials} setMaterials={setMaterials} finished={finished} setFinished={setFinished} />
        )}
        {tab === "compras" && (
          <ComprasTab orders={orders} setOrders={setOrders} clients={clients} />
        )}
      </main>
    </div>
  );
}

// ================= CLIENTES =================
function ClientesTab({ clients, setClients, orders }) {
  const [editing, setEditing] = useState(null); // client object or null
  const [showForm, setShowForm] = useState(false);

  const emptyClient = { id: "", name: "", phone: "", email: "", address: "", notes: "" };

  function openNew() {
    setEditing({ ...emptyClient, id: uid() });
    setShowForm(true);
  }
  function openEdit(c) {
    setEditing({ ...c });
    setShowForm(true);
  }
  function save() {
    if (!editing.name.trim()) return;
    setClients((prev) => {
      const exists = prev.some((c) => c.id === editing.id);
      return exists ? prev.map((c) => (c.id === editing.id ? editing : c)) : [...prev, editing];
    });
    setShowForm(false);
    setEditing(null);
  }
  function remove(id) {
    if (orders.some((o) => o.clientId === id)) {
      if (!confirm("Este cliente tem pedidos vinculados. Remover mesmo assim?")) return;
    }
    setClients((prev) => prev.filter((c) => c.id !== id));
  }

  return (
    <div className="flex flex-col gap-5">
      <div className="flex items-center justify-between">
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 28 }}>Clientes</h2>
        <Btn onClick={openNew}><Plus size={16} /> Novo cliente</Btn>
      </div>

      {showForm && (
        <SectionCard>
          <div className="grid sm:grid-cols-2 gap-4">
            <Field label="Nome"><TextInput value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} placeholder="Nome do cliente" /></Field>
            <Field label="Telefone / WhatsApp"><TextInput value={editing.phone} onChange={(e) => setEditing({ ...editing, phone: e.target.value })} placeholder="(11) 90000-0000" /></Field>
            <Field label="E-mail"><TextInput value={editing.email} onChange={(e) => setEditing({ ...editing, email: e.target.value })} placeholder="cliente@email.com" /></Field>

function emptyOrder() {
  return {
    id: uid(),
    clientId: "",
    instrumentType: INSTRUMENT_TYPES[0],
    instrumentTypeOther: "",
    top: "",
    sidesBack: "",
    neck: "",
    fretboard: "",
    notes: "",
    value: "",
    paymentPlan: PAYMENT_PLANS[0],
    status: ORDER_STATUS[0],
    dueDate: "",
    payments: [],
    shoppingItems: DEFAULT_SHOPPING_ITEMS.map((name) => ({ id: uid(), name, bought: false })),
  };
}

function PedidosTab({ orders, setOrders, clients }) {
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [expanded, setExpanded] = useState(null);

  function openNew() {
    setEditing(emptyOrder());
    setShowForm(true);
  }
  function openEdit(o) {
    setEditing({ ...o, payments: [...o.payments] });
    setShowForm(true);
  }
  function save() {
    if (!editing.clientId) { alert("Selecione um cliente."); return; }
    setOrders((prev) => {
      const exists = prev.some((o) => o.id === editing.id);
      return exists ? prev.map((o) => (o.id === editing.id ? editing : o)) : [...prev, editing];
    });
    setShowForm(false);
    setEditing(null);
  }
  function remove(id) {
    if (!confirm("Remover este pedido?")) return;
    setOrders((prev) => prev.filter((o) => o.id !== id));
  }

  function addPayment() {
    setEditing({
      ...editing,
      payments: [...editing.payments, { id: uid(), date: new Date().toISOString().slice(0, 10), amount: "", method: PAYMENT_METHODS[0] }],
    });
  }
  function updatePayment(pid, field, val) {
    setEditing({
      ...editing,
      payments: editing.payments.map((p) => (p.id === pid ? { ...p, [field]: val } : p)),
    });
  }
  function removePayment(pid) {
    setEditing({ ...editing, payments: editing.payments.filter((p) => p.id !== pid) });
  }

  const clientName = (id) => clients.find((c) => c.id === id)?.name || "— sem cliente —";

  const upcomingDue = orders
    .filter((o) => o.dueDate && o.status !== "Entregue" && o.status !== "Cancelado")
    .map((o) => {
      const due = new Date(o.dueDate + "T00:00:00");
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const threeMonths = new Date(today);
      threeMonths.setMonth(threeMonths.getMonth() + 3);
      const daysLeft = Math.round((due - today) / 86400000);
      return { order: o, due, daysLeft, withinWindow: due >= today ? due <= threeMonths : true };
    })
    .filter((x) => x.withinWindow)
    .sort((a, b) => a.due - b.due);

  return (
    <div className="flex flex-col gap-5">
      <div className="flex items-center justify-between">
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 28 }}>Pedidos</h2>
        <Btn onClick={openNew} disabled={clients.length === 0}><Plus size={16} /> Novo pedido</Btn>
      </div>

      {upcomingDue.length > 0 && (
        <SectionCard style={{ borderColor: C.brass }}>
          <div className="text-xs uppercase tracking-wider mb-2" style={{ color: C.brassDark, letterSpacing: "0.08em" }}>
            Lembrete — entregas previstas nos próximos 3 meses
          </div>
          <ul className="flex flex-col gap-1.5">
            {upcomingDue.map(({ order: o, daysLeft }) => (
              <li key={o.id} className="text-sm flex flex-wrap items-baseline gap-x-2" style={{ color: C.espresso }}>
                <b>{instrumentLabel(o)}</b>
                <span style={{ color: C.espressoSoft }}>— {clientName(o.clientId)}</span>
                <span className="mono text-xs" style={{ color: daysLeft < 0 ? C.danger : C.brassDark }}>
                  {daysLeft < 0
                    ? `atrasado (${o.dueDate})`
                    : daysLeft === 0
                    ? "entrega hoje"
                    : `em ${daysLeft} dia${daysLeft === 1 ? "" : "s"} (${o.dueDate})`}
                </span>
              </li>
            ))}
          </ul>
        </SectionCard>
      )}

      {clients.length === 0 && (
        <div className="text-sm" style={{ color: C.espressoSoft }}>Cadastre um cliente antes de criar um pedido.</div>
      )}

      {showForm && (
        <SectionCard>
          <div className="grid sm:grid-cols-2 gap-4">
            <Field label="Cliente">
              <Select value={editing.clientId} onChange={(e) => setEditing({ ...editing, clientId: e.target.value })}>
                <option value="">Selecione…</option>
                {clients.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </Select>
            </Field>
            <Field label="Tipo de instrumento">
              <Select value={editing.instrumentType} onChange={(e) => setEditing({ ...editing, instrumentType: e.target.value })}>
                {INSTRUMENT_TYPES.map((i) => <option key={i} value={i}>{i}</option>)}
              </Select>
            </Field>
            {editing.instrumentType === "Outro" && (
              <Field label="Qual instrumento?">
                <TextInput
                  value={editing.instrumentTypeOther}
                  onChange={(e) => setEditing({ ...editing, instrumentTypeOther: e.target.value })}
                  placeholder="Digite o tipo do instrumento"
                />
              </Field>
            )}
            <Field label="Tampo"><TextInput value={editing.top} onChange={(e) => setEditing({ ...editing, top: e.target.value })} placeholder="Ex: Lunar Spruce MA" /></Field>
            <Field label="Lateral e fundo"><TextInput value={editing.sidesBack} onChange={(e) => setEditing({ ...editing, sidesBack: e.target.value })} placeholder="Ex: Jacarandá da Bahia" /></Field>
            <Field label="Braço"><TextInput value={editing.neck} onChange={(e) => setEditing({ ...editing, neck: e.target.value })} placeholder="Ex: Sucupira" /></Field>
            <Field label="Escala"><TextInput value={editing.fretboard} onChange={(e) => setEditing({ ...editing, fretboard: e.target.value })} placeholder="Ex: Ébano" /></Field>
            <Field label="Valor total (R$)"><TextInput type="number" value={editing.value} onChange={(e) => setEditing({ ...editing, value: e.target.value })} placeholder="0,00" /></Field>
            <Field label="Plano de pagamento">
              <Select value={editing.paymentPlan} onChange={(e) => setEditing({ ...editing, paymentPlan: e.target.value })}>
                {PAYMENT_PLANS.map((p) => <option key={p} value={p}>{p}</option>)}
              </Select>
            </Field>
            <Field label="Status do pedido">
              <Select value={editing.status} onChange={(e) => setEditing({ ...editing, status: e.target.value })}>
                {ORDER_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
              </Select>
            </Field>
            <Field label="Prazo de entrega (opcional)">
              <TextInput type="date" value={editing.dueDate} onChange={(e) => setEditing({ ...editing, dueDate: e.target.value })} />
            </Field>
            <Field label="Observações" className="sm:col-span-2"><TextArea rows={3} value={editing.notes} onChange={(e) => setEditing({ ...editing, notes: e.target.value })} /></Field>
          </div>

          <div className="mt-5">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs uppercase tracking-wider" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>Pagamentos recebidos</span>
              <Btn variant="ghost" onClick={addPayment}><Plus size={14} /> Adicionar pagamento</Btn>
            </div>
            <div className="flex flex-col gap-2">
              {editing.payments.map((p) => (
                <div key={p.id} className="grid grid-cols-[1fr_1fr_1fr_auto] gap-2 items-center">
                  <TextInput type="date" value={p.date} onChange={(e) => updatePayment(p.id, "date", e.target.value)} />
                  <TextInput type="number" value={p.amount} onChange={(e) => updatePayment(p.id, "amount", e.target.value)} placeholder="Valor" />
                  <Select value={p.method} onChange={(e) => updatePayment(p.id, "method", e.target.value)}>
                    {PAYMENT_METHODS.map((m) => <option key={m} value={m}>{m}</option>)}
                  </Select>
                  <button onClick={() => removePayment(p.id)} style={{ color: C.danger }}><Trash2 size={16} /></button>
                </div>
              ))}
              {editing.payments.length === 0 && <div className="text-sm" style={{ color: C.espressoSoft }}>Nenhum pagamento lançado ainda.</div>}
            </div>
            {(() => {
              const total = editing.payments.reduce((s, p) => s + (Number(p.amount) || 0), 0);
              const remaining = (Number(editing.value) || 0) - total;
              return (
                <div className="flex gap-6 mt-3 text-sm mono">
                  <span style={{ color: C.success }}>Recebido: {brl(total)}</span>

// ================= COMPRAS =================
function ComprasTab({ orders, setOrders, clients }) {
  const [expanded, setExpanded] = useState(null);
  const [extraChoice, setExtraChoice] = useState({});
  const [extraCustom, setExtraCustom] = useState({});

  const clientName = (id) => clients.find((c) => c.id === id)?.name || "— sem cliente —";

  function ensureItems(order) {
    return order.shoppingItems && order.shoppingItems.length
      ? order.shoppingItems
      : DEFAULT_SHOPPING_ITEMS.map((name) => ({ id: uid(), name, bought: false }));
  }

  function toggleItem(orderId, itemId) {
    setOrders((prev) =>
      prev.map((o) => {
        if (o.id !== orderId) return o;
        const items = ensureItems(o);
        return { ...o, shoppingItems: items.map((it) => (it.id === itemId ? { ...it, bought: !it.bought } : it)) };
      })
    );
  }

  function removeItem(orderId, itemId) {
    setOrders((prev) =>
      prev.map((o) => {
        if (o.id !== orderId) return o;
        const items = ensureItems(o);
        return { ...o, shoppingItems: items.filter((it) => it.id !== itemId) };
      })
    );
  }

  function addExtraItem(order) {
    const choice = extraChoice[order.id] || EXTRA_SHOPPING_OPTIONS[0];
    const name = choice === "Outro" ? (extraCustom[order.id] || "").trim() : choice;
    if (!name) return;
    setOrders((prev) =>
      prev.map((o) => {
        if (o.id !== order.id) return o;
        const items = ensureItems(o);
        return { ...o, shoppingItems: [...items, { id: uid(), name, bought: false }] };
      })
    );
    setExtraCustom({ ...extraCustom, [order.id]: "" });
  }

  const relevantOrders = orders.filter((o) => o.status !== "Cancelado");

  return (
    <div className="flex flex-col gap-5">
      <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 28 }}>Lista de Compras</h2>

      {relevantOrders.length === 0 && (
        <div className="text-sm" style={{ color: C.espressoSoft }}>Nenhum pedido para acompanhar ainda.</div>
      )}

      <div className="flex flex-col gap-3">
        {relevantOrders.map((o) => {
          const items = ensureItems(o);
          const allBought = items.length > 0 && items.every((it) => it.bought);
          const isOpen = expanded === o.id;
          const boughtCount = items.filter((it) => it.bought).length;
          return (
            <SectionCard key={o.id} style={{ borderColor: allBought ? C.panelLine : C.danger, borderWidth: allBought ? 1 : 2 }}>
              <div className="flex items-center justify-between cursor-pointer" onClick={() => setExpanded(isOpen ? null : o.id)}>
                <div className="flex items-center gap-2">
                  {isOpen ? <ChevronDown size={18} color={C.brass} /> : <ChevronRight size={18} color={C.brass} />}
                  <div>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", color: allBought ? C.espresso : C.danger, fontSize: 19 }}>
                      {instrumentLabel(o)} — {clientName(o.clientId)}
                    </div>
                    <div className="text-xs mono mt-0.5" style={{ color: allBought ? C.success : C.danger }}>
                      {boughtCount}/{items.length} comprado(s){allBought ? " — completo" : ""}
                    </div>
                  </div>
                </div>
              </div>

              {isOpen && (
                <div className="mt-4 pt-4" style={{ borderTop: `1px solid ${C.panelLine}` }}>
                  <div className="flex flex-col gap-2">
                    {items.map((it) => (
                      <div key={it.id} className="flex items-center gap-3">
                        <button
                          onClick={() => toggleItem(o.id, it.id)}
                          style={{
                            width: 22,
                            height: 22,
                            borderRadius: 6,
                            border: `1.5px solid ${it.bought ? C.success : C.panelLine}`,
                            background: it.bought ? C.success : "transparent",
                          }}
                          className="flex items-center justify-center shrink-0"
                        >
                          {it.bought && <Check size={14} color="#fff" />}
                        </button>
                        <span
                          className="text-sm flex-1"
                          style={{ color: it.bought ? C.espressoSoft : C.espresso, textDecoration: it.bought ? "line-through" : "none" }}
                        >
                          {it.name}
                        </span>
                        <button onClick={() => removeItem(o.id, it.id)} style={{ color: C.danger }}>
                          <Trash2 size={14} />
                        </button>
                      </div>
                    ))}
                  </div>

                  <div className="flex flex-wrap items-center gap-2 mt-4 pt-4" style={{ borderTop: `1px solid ${C.panelLine}` }}>
                    <Select
                      value={extraChoice[o.id] || EXTRA_SHOPPING_OPTIONS[0]}
                      onChange={(e) => setExtraChoice({ ...extraChoice, [o.id]: e.target.value })}
                    >
                      {EXTRA_SHOPPING_OPTIONS.map((opt) => <option key={opt} value={opt}>{opt}</option>)}
                    </Select>
                    {(extraChoice[o.id] || EXTRA_SHOPPING_OPTIONS[0]) === "Outro" && (
                      <TextInput
                        value={extraCustom[o.id] || ""}
                        onChange={(e) => setExtraCustom({ ...extraCustom, [o.id]: e.target.value })}
                        placeholder="Nome do item extra"
                      />
                    )}
                    <Btn variant="ghost" onClick={() => addExtraItem(o)}><Plus size={14} /> Adicionar item</Btn>
                  </div>
                </div>
              )}
            </SectionCard>
          );
        })}
      </div>
    </div>
  );
}

// ================= FINANCEIRO =================
function FinanceiroTab({ orders, clients }) {
  const allPayments = useMemo(() => {
    const list = [];
    orders.forEach((o) => {
      o.payments.forEach((p) => {
        list.push({
          ...p,
          amount: Number(p.amount) || 0,
          orderId: o.id,
          instrumentType: instrumentLabel(o),
          clientName: clients.find((c) => c.id === o.clientId)?.name || "—",
        });
      });
    });
    return list.filter((p) => p.date).sort((a, b) => a.date.localeCompare(b.date));
  }, [orders, clients]);

  const years = useMemo(() => {
    const set = new Set(allPayments.map((p) => p.date.slice(0, 4)));
    set.add(String(new Date().getFullYear()));
    return Array.from(set).sort().reverse();
  }, [allPayments]);

  const [year, setYear] = useState(years[0] || String(new Date().getFullYear()));
  const [month, setMonth] = useState(String(new Date().getMonth() + 1).padStart(2, "0"));

  const yearPayments = allPayments.filter((p) => p.date.slice(0, 4) === year);
  const annualTotal = yearPayments.reduce((s, p) => s + p.amount, 0);

  const monthlyTotals = Array.from({ length: 12 }, (_, i) => {
    const mm = String(i + 1).padStart(2, "0");
    return yearPayments.filter((p) => p.date.slice(5, 7) === mm).reduce((s, p) => s + p.amount, 0);
  });
  const maxMonthly = Math.max(1, ...monthlyTotals);

  const monthPayments = yearPayments.filter((p) => p.date.slice(5, 7) === month);
  const monthlyTotal = monthPayments.reduce((s, p) => s + p.amount, 0);

  const byInstrument = useMemo(() => {
    const map = {};
    yearPayments.forEach((p) => { map[p.instrumentType] = (map[p.instrumentType] || 0) + p.amount; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [yearPayments]);

  const byMethod = useMemo(() => {
    const map = {};
    yearPayments.forEach((p) => { map[p.method] = (map[p.method] || 0) + p.amount; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [yearPayments]);

  const outstandingTotal = useMemo(() => {
    return orders.reduce((s, o) => {
      const paid = o.payments.reduce((ss, p) => ss + (Number(p.amount) || 0), 0);
      const rem = (Number(o.value) || 0) - paid;
      return s + (rem > 0 ? rem : 0);
    }, 0);
  }, [orders]);

  const avgTicket = useMemo(() => {
    const withValue = orders.filter((o) => Number(o.value) > 0);
    if (withValue.length === 0) return 0;
    return withValue.reduce((s, o) => s + Number(o.value), 0) / withValue.length;
  }, [orders]);

  const openOrdersCount = orders.filter((o) => o.status !== "Entregue" && o.status !== "Cancelado").length;
  const bestMonthIdx = monthlyTotals.indexOf(Math.max(...monthlyTotals));
  const avgMonthly = annualTotal / 12;

  return (
    <div className="print-area flex flex-col gap-5">
      <div className="flex items-center justify-between no-print">
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 28 }}>Financeiro</h2>
        <Btn variant="ghost" onClick={() => window.print()}><Printer size={16} /> Imprimir relatório</Btn>
      </div>

      <div className="print-only mb-1">
        <div style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 26 }}>PAIZINHO — Relatório Financeiro</div>
        <div className="text-sm mono" style={{ color: C.espressoSoft }}>
          Referência: {monthNames[Number(month) - 1]}/{year} · Gerado em {new Date().toLocaleDateString("pt-BR")}
        </div>
      </div>

      <div className="flex flex-wrap gap-4 items-end no-print">
        <Field label="Ano">
          <Select value={year} onChange={(e) => setYear(e.target.value)}>
            {years.map((y) => <option key={y} value={y}>{y}</option>)}
          </Select>
        </Field>
        <Field label="Mês">
          <Select value={month} onChange={(e) => setMonth(e.target.value)}>
            {monthNames.map((m, i) => <option key={m} value={String(i + 1).padStart(2, "0")}>{m}</option>)}
          </Select>
        </Field>
      </div>

      <div className="grid sm:grid-cols-2 gap-4">
        <SectionCard>
          <div className="text-xs uppercase tracking-wider" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
            Faturamento de {monthNames[Number(month) - 1]}/{year}
          </div>
          <div className="mono mt-2" style={{ color: C.espresso, fontSize: 30 }}>{brl(monthlyTotal)}</div>
        </SectionCard>
        <SectionCard>
          <div className="text-xs uppercase tracking-wider" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
            Faturamento anual — {year}
          </div>
          <div className="mono mt-2" style={{ color: C.espresso, fontSize: 30 }}>{brl(annualTotal)}</div>
        </SectionCard>
      </div>

      <SectionCard>
        <div className="text-xs uppercase tracking-wider mb-3" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
          Indicadores do negócio
        </div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm">
          <div>
            <div style={{ color: C.espressoSoft }} className="text-xs uppercase tracking-wider">Ticket médio</div>
            <div className="mono mt-1" style={{ color: C.espresso, fontSize: 18 }}>{brl(avgTicket)}</div>
          </div>
          <div>
            <div style={{ color: C.espressoSoft }} className="text-xs uppercase tracking-wider">Saldo total a receber</div>
            <div className="mono mt-1" style={{ color: outstandingTotal > 0 ? C.danger : C.success, fontSize: 18 }}>{brl(outstandingTotal)}</div>
          </div>
          <div>
            <div style={{ color: C.espressoSoft }} className="text-xs uppercase tracking-wider">Pedidos em aberto</div>
            <div className="mono mt-1" style={{ color: C.espresso, fontSize: 18 }}>{openOrdersCount}</div>
          </div>
          <div>
            <div style={{ color: C.espressoSoft }} className="text-xs uppercase tracking-wider">Média mensal — {year}</div>
            <div className="mono mt-1" style={{ color: C.espresso, fontSize: 18 }}>{brl(avgMonthly)}</div>
          </div>
        </div>
        {annualTotal > 0 && (
          <div className="text-sm mt-3" style={{ color: C.espressoSoft }}>
            Melhor mês do ano: <b style={{ color: C.espresso }}>{monthNames[bestMonthIdx]}</b> ({brl(monthlyTotals[bestMonthIdx])})
          </div>
        )}
      </SectionCard>

      <div className="grid sm:grid-cols-2 gap-4">
        <SectionCard>
          <div className="text-xs uppercase tracking-wider mb-3" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
            Faturamento por instrumento — {year}
          </div>
          {byInstrument.length === 0 ? (
            <div className="text-sm" style={{ color: C.espressoSoft }}>Sem dados neste ano.</div>
          ) : (
            <table className="w-full text-sm">
              <tbody>
                {byInstrument.map(([type, val]) => (
                  <tr key={type} style={{ borderTop: `1px solid ${C.panelLine}` }}>
                    <td className="py-1.5 pr-3">{type}</td>
                    <td className="py-1.5 pr-3 text-right mono" style={{ color: C.espresso }}>{brl(val)}</td>
                    <td className="py-1.5 text-right mono text-xs" style={{ color: C.espressoSoft, width: 50 }}>
                      {annualTotal > 0 ? `${((val / annualTotal) * 100).toFixed(0)}%` : "—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </SectionCard>
        <SectionCard>
          <div className="text-xs uppercase tracking-wider mb-3" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
            Faturamento por forma de pagamento — {year}
          </div>
          {byMethod.length === 0 ? (
            <div className="text-sm" style={{ color: C.espressoSoft }}>Sem dados neste ano.</div>
          ) : (
            <table className="w-full text-sm">
              <tbody>
                {byMethod.map(([m, val]) => (
                  <tr key={m} style={{ borderTop: `1px solid ${C.panelLine}` }}>
                    <td className="py-1.5 pr-3">{m}</td>
                    <td className="py-1.5 pr-3 text-right mono" style={{ color: C.espresso }}>{brl(val)}</td>
                    <td className="py-1.5 text-right mono text-xs" style={{ color: C.espressoSoft, width: 50 }}>
                      {annualTotal > 0 ? `${((val / annualTotal) * 100).toFixed(0)}%` : "—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </SectionCard>
      </div>

      <SectionCard>
        <div className="text-xs uppercase tracking-wider mb-3" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
          Panorama mensal — {year}
        </div>
        <div className="flex items-end gap-2 h-32">
          {monthlyTotals.map((v, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <div
                title={brl(v)}
                style={{
                  width: "100%",
                  height: `${Math.max(4, (v / maxMonthly) * 100)}%`,
                  background: String(i + 1).padStart(2, "0") === month ? C.brass : C.panelLine,
                  borderRadius: 3,
                }}
              />
              <span className="text-[10px] mono" style={{ color: C.espressoSoft }}>{monthNames[i]}</span>
            </div>
          ))}
        </div>
      </SectionCard>

      <SectionCard>
        <div className="text-xs uppercase tracking-wider mb-3" style={{ color: C.espressoSoft, letterSpacing: "0.08em" }}>
          Detalhamento — {monthNames[Number(month) - 1]}/{year}
        </div>
        {monthPayments.length === 0 ? (
          <div className="text-sm" style={{ color: C.espressoSoft }}>Nenhum pagamento neste mês.</div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr style={{ color: C.espressoSoft }} className="text-left uppercase text-xs tracking-wider">
                  <th className="py-1.5 pr-3">Data</th>
                  <th className="py-1.5 pr-3">Cliente</th>
                  <th className="py-1.5 pr-3">Instrumento</th>
                  <th className="py-1.5 pr-3">Forma</th>
                  <th className="py-1.5 pr-3 text-right">Valor</th>
                </tr>
              </thead>
              <tbody>
                {monthPayments.map((p) => (
                  <tr key={p.id} style={{ borderTop: `1px solid ${C.panelLine}` }}>
                    <td className="py-1.5 pr-3 mono">{p.date}</td>
                    <td className="py-1.5 pr-3">{p.clientName}</td>
                    <td className="py-1.5 pr-3">{p.instrumentType}</td>
                    <td className="py-1.5 pr-3">{p.method}</td>
                    <td className="py-1.5 pr-3 text-right mono" style={{ color: C.success }}>{brl(p.amount)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </SectionCard>
    </div>
  );
}

// ================= ESTOQUE =================
function emptyMaterial() {
  return { id: uid(), name: "", quantity: "", unit: "", notes: "" };
}
function emptyFinished() {
  return { id: uid(), name: "", instrumentType: INSTRUMENT_TYPES[0], instrumentTypeOther: "", value: "", status: STOCK_STATUS[0], notes: "" };
}

function EstoqueTab({ materials, setMaterials, finished, setFinished }) {
  const [matEditing, setMatEditing] = useState(null);
  const [finEditing, setFinEditing] = useState(null);

  function saveMat() {
    if (!matEditing.name.trim()) return;
    setMaterials((prev) => {
      const exists = prev.some((m) => m.id === matEditing.id);
      return exists ? prev.map((m) => (m.id === matEditing.id ? matEditing : m)) : [...prev, matEditing];
    });
    setMatEditing(null);
  }
  function saveFin() {
    if (!finEditing.name.trim()) return;
    setFinished((prev) => {
      const exists = prev.some((f) => f.id === finEditing.id);
      return exists ? prev.map((f) => (f.id === finEditing.id ? finEditing : f)) : [...prev, finEditing];
    });
    setFinEditing(null);
  }

  const totalMaterialItems = materials.length;
  const totalFinishedValue = finished.filter((f) => f.status !== "Vendido").reduce((s, f) => s + (Number(f.value) || 0), 0);

  return (
    <div className="print-area flex flex-col gap-8">
      <div className="flex items-center justify-between no-print">
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 28 }}>Estoque</h2>
        <Btn variant="ghost" onClick={() => window.print()}><Printer size={16} /> Imprimir relatório</Btn>
      </div>

      <div className="print-only mb-1">
        <div style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 26 }}>PAIZINHO — Relatório de Estoque</div>
        <div className="text-sm mono" style={{ color: C.espressoSoft }}>
          {totalMaterialItems} material(is) cadastrado(s) · Gerado em {new Date().toLocaleDateString("pt-BR")}
        </div>
      </div>

      {/* materiais */}
      <div className="flex flex-col gap-3">
        <div className="flex items-center justify-between">
          <h3 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 20 }}>Materiais</h3>
          <Btn className="no-print" onClick={() => setMatEditing(emptyMaterial())}><Plus size={16} /> Novo material</Btn>
        </div>

        {matEditing && (
          <SectionCard className="no-print">
            <div className="grid sm:grid-cols-4 gap-3">
              <Field label="Material" className="sm:col-span-2"><TextInput value={matEditing.name} onChange={(e) => setMatEditing({ ...matEditing, name: e.target.value })} placeholder="Ex: Jacarandá da Bahia" /></Field>
              <Field label="Quantidade"><TextInput type="number" value={matEditing.quantity} onChange={(e) => setMatEditing({ ...matEditing, quantity: e.target.value })} /></Field>
              <Field label="Unidade"><TextInput value={matEditing.unit} onChange={(e) => setMatEditing({ ...matEditing, unit: e.target.value })} placeholder="jogos, un, m²…" /></Field>
              <Field label="Observações" className="sm:col-span-4"><TextArea rows={2} value={matEditing.notes} onChange={(e) => setMatEditing({ ...matEditing, notes: e.target.value })} /></Field>
            </div>
            <div className="flex gap-2 mt-3">
              <Btn onClick={saveMat}>Salvar</Btn>
              <Btn variant="ghost" onClick={() => setMatEditing(null)}>Cancelar</Btn>
            </div>
          </SectionCard>
        )}

        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {materials.length === 0 && <div className="text-sm" style={{ color: C.espressoSoft }}>Nenhum material cadastrado.</div>}
          {materials.map((m) => (
            <SectionCard key={m.id}>
              <div className="flex items-start justify-between">
                <div>
                  <div style={{ color: C.espresso, fontWeight: 600 }}>{m.name}</div>
                  <div className="text-sm mono mt-1" style={{ color: C.brassDark }}>{m.quantity} {m.unit}</div>
                  {m.notes && <div className="text-sm mt-1" style={{ color: C.espressoSoft }}>{m.notes}</div>}
                </div>
                <div className="flex gap-1 no-print">
                  <button onClick={() => setMatEditing(m)} style={{ color: C.brass }}><Pencil size={16} /></button>
                  <button onClick={() => setMaterials((prev) => prev.filter((x) => x.id !== m.id))} style={{ color: C.danger }}><Trash2 size={16} /></button>
                </div>
              </div>
            </SectionCard>
          ))}
        </div>
      </div>

      {/* instrumentos prontos */}
      <div className="flex flex-col gap-3">
        <div className="flex items-center justify-between">
          <h3 style={{ fontFamily: "'Cormorant Garamond', serif", color: C.espresso, fontSize: 20 }}>Instrumentos prontos</h3>
          <Btn className="no-print" onClick={() => setFinEditing(emptyFinished())}><Plus size={16} /> Novo instrumento</Btn>
        </div>

        {finEditing && (
          <SectionCard className="no-print">
            <div className="grid sm:grid-cols-4 gap-3">
              <Field label="Nome / modelo" className="sm:col-span-2"><TextInput value={finEditing.name} onChange={(e) => setFinEditing({ ...finEditing, name: e.target.value })} /></Field>
              <Field label="Tipo">
                <Select value={finEditing.instrumentType} onChange={(e) => setFinEditing({ ...finEditing, instrumentType: e.target.value })}>
                  {INSTRUMENT_TYPES.map((i) => <option key={i} value={i}>{i}</option>)}
                </Select>
              </Field>
              {finEditing.instrumentType === "Outro" && (
                <Field label="Qual instrumento?">
                  <TextInput
                    value={finEditing.instrumentTypeOther}
                    onChange={(e) => setFinEditing({ ...finEditing, instrumentTypeOther: e.target.value })}
                    placeholder="Digite o tipo do instrumento"
                  />
                </Field>
              )}
              <Field label="Status">
                <Select value={finEditing.status} onChange={(e) => setFinEditing({ ...finEditing, status: e.target.value })}>
                  {STOCK_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
                </Select>
              </Field>
              <Field label="Valor (R$)"><TextInput type="number" value={finEditing.value} onChange={(e) => setFinEditing({ ...finEditing, value: e.target.value })} /></Field>
              <Field label="Observações" className="sm:col-span-3"><TextArea rows={2} value={finEditing.notes} onChange={(e) => setFinEditing({ ...finEditing, notes: e.target.value })} /></Field>
            </div>
            <div className="flex gap-2 mt-3">
              <Btn onClick={saveFin}>Salvar</Btn>
              <Btn variant="ghost" onClick={() => setFinEditing(null)}>Cancelar</Btn>
            </div>
          </SectionCard>
        )}

        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {finished.length === 0 && <div className="text-sm" style={{ color: C.espressoSoft }}>Nenhum instrumento pronto no estoque no momento.</div>}
          {finished.map((f) => (
            <SectionCard key={f.id}>
              <div className="flex items-start justify-between">
                <div>
                  <div style={{ color: C.espresso, fontWeight: 600 }}>{f.name}</div>
                  <div className="text-xs mono mt-0.5" style={{ color: C.brassDark }}>{instrumentLabel(f)} · {f.status}</div>
                  <div className="text-sm mono mt-1" style={{ color: C.espresso }}>{brl(f.value)}</div>
                  {f.notes && <div className="text-sm mt-1" style={{ color: C.espressoSoft }}>{f.notes}</div>}
                </div>
                <div className="flex gap-1 no-print">
                  <button onClick={() => setFinEditing(f)} style={{ color: C.brass }}><Pencil size={16} /></button>
                  <button onClick={() => setFinished((prev) => prev.filter((x) => x.id !== f.id))} style={{ color: C.danger }}><Trash2 size={16} /></button>
                </div>
              </div>
            </SectionCard>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);


</script>
<script>
  // Transforma manualmente com o runtime "classic" do React (compatível com os
  // builds via CDN que não usam import/módulos), evitando o import automático
  // de "react/jsx-runtime" que o Babel usa por padrão e que trava sem um bundler.
  (function () {
    var source = document.getElementById("app-source").textContent;
    var output = Babel.transform(source, { presets: [["react", { runtime: "classic" }]] }).code;
    var script = document.createElement("script");
    script.text = output;
    document.body.appendChild(script);
  })();
</script>
</body>
